<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h2 {
            text-align: center;
            padding-bottom: 20px;
            padding-top: 20px;
            padding-left: 50px;
            padding-right: 20px;
        }
        form {
            max-width: 400px;
            margin: auto;
            background-color: #f2f2f2;
            padding: 20px;
            border-radius: 5px;

        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Form Validation Example</h1>
    <form id="myForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br><br>
        <button type="submit">Submit</button>
    </form>
    <script>
       let i = document.getElementById("username");
       let f = document.querySelector("#myForm");
       i.addEventListener("keypress",(event =>{
        const pattern = /^[a-zA-Z]$/;
        if (!pattern.test(event.key)) {
            event.preventDefault();
        }
       }));
       let e = document.getElementById("email");
       e.addEventListener("keypress",(event =>{
        const pattern = /^[a-zA-Z0-9@.]$/;
        if (!pattern.test(event.key)) {
            event.preventDefault();
        }
       }));
       let p = document.getElementById("password");
       p.addEventListener("keypress",(event =>{
        const pattern = /^(?=.*[a-zA-Z])(?=.*[0-9]).*$/;
        if (!pattern.test(event.key)) {
            event.preventDefault();
        }
       }));
       f.addEventListener("submit",(event) => {
        event.preventDefault();
       });
       let un = document.getElementById("username").value.trim();
       let em = document.getElementById("email").value.trim();
       let pw = document.getElementById("password").value.trim();
       if (un === "") {
        alert("Username is required");
        return false;
       }
         if (em === "") {
          alert("Email is required");
          return false;
         }
            if (pw === "") {
            alert("Password is required");
            return false;
            }
    </script>
</body>
</html>
